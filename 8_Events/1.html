                    alt="temple" onclick="alert('DEKHO MANDIR')"></li> 

            <li><img width="200px" src="https://raw.githubusercontent.com/adityaxsit/jsYT/main/8_Events/IMG-20240606-WA0066.jpg"

            <li><img width="200px" src="https://raw.githubusercontent.com/adityaxsit/jsYT/main/8_Events/IMG-20240606-WA0232.jpg"
                    alt="mount" id="mount"></li>

            <li><img width="200px" src="https://raw.githubusercontent.com/adityaxsit/jsYT/main/8_Events/IMG_20240603_021825.jpg"

            </li>
        </ul>

</body>
<script>
    /* document.getElementById('maggie').onclick=function(){
        alert("Maggie lelo 120 ka")
    } */


    /* document.getElementById('clouds').addEventListener('click',function(){
        alert("Clouds clicked")
    },false) */

    document.getElementById('images').addEventListener('click',function(e){
        if(e.target.tagName==='IMG')
            alert("Images clicked")
    },false) 
     /* true => jo phle clciked hoga */


    /* document.getElementById('mount').addEventListener('click',function(e){
        alert("mountain clicked")
        e.stopPropagation();
    },flase) */


    document.getElementById('JS').addEventListener('click',function(e){
        e.preventDefault();
        e.stopPropagation();
        alert("Nhi jana h udhr")
    })

    /* to remove the clicked item */
    document.querySelector('#images').addEventListener('click',function(e){

        //console.log(e.target.tagName)
        if(e.target.tagName==='IMG'){
            let item=e.target.parentNode;
            item.remove();
        }


        // item.parentNode.removeChild(item)   ===> another way of removing items
    },false)

</script>
